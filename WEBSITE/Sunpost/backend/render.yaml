services:
  - type: web
    name: sunpost-backend
    env: python
    root: WEBSITE/Sunpost/backend
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8000
      - key: GOOGLE_APPLICATION_CREDENTIALS
        scope: build
        fromFile: true
      - key: FIREBASE_DATABASE_URL
        scope: runtime
        sync: false
      - key: FIREBASE_WEB_API_KEY
        scope: runtime
        sync: false
      - key: ADMIN_API_KEY
        scope: runtime
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        scope: runtime
        sync: false
