services:
  - type: web
    name: sunpost-backend
    env: python
    pythonVersion: 3.12.0
    root: WEBSITE/Sunpost/backend
    plan: free
    buildCommand: python -m pip install --upgrade pip && PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python python -m pip install --no-binary protobuf -r requirements.txt
    startCommand: bash start_render.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8000
      - key: GOOGLE_APPLICATION_CREDENTIALS
        scope: build
        fromFile: true
      - key: FIREBASE_DATABASE_URL
        scope: runtime
        sync: false
      - key: FIREBASE_WEB_API_KEY
        scope: runtime
        sync: false
      - key: ADMIN_API_KEY
        scope: runtime
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        scope: runtime
        sync: false
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
        scope: runtime
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
        scope: build
