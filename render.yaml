services:
  - type: web
    name: sunpost-backend
    env: python
    pythonVersion: 3.12.0
    plan: free
    buildCommand: cd WEBSITE/Sunpost/backend && python -m pip install --upgrade pip && PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python python -m pip install --no-binary protobuf -r requirements.txt
    envVars:
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
        scope: build
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
        scope: runtime
    startCommand: cd WEBSITE/Sunpost/backend && bash start_render.sh
