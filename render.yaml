services:
  - type: web
    name: sunpost-backend
    env: python
    pythonVersion: 3.12.0
    plan: free
    buildCommand: cd WEBSITE/Sunpost/backend && python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: cd WEBSITE/Sunpost/backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
