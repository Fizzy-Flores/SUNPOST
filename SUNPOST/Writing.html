<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Writing — SUNPOST</title>
    <link rel="stylesheet" href="homepagestyle.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand"><img src="IMAGE/SUN ICON.PNG" alt="SunPOST logo" class="brand-logo"><a href="Homepage.html">SunPOST</a></div>
          <nav class="tabs">
            <a href="Homepage.html" class="tab">Home</a>
            <a href="Commission.html" class="tab">Commissions</a>
            <a href="Shops.html" class="tab">Shop</a>
          </nav>
          <div class="search-user">
            <label class="search">
              <input type="search" placeholder="Search products, artists..." />
              <button type="button" class="search-btn" aria-label="Search">🔍</button>
            </label>
            <div class="user-icon-container">
              <button type="button" class="profile-button" aria-label="Profile menu">
                <img src="IMAGE/PFP PLACEHOLDER.png" alt="you" />
              </button>
              <div class="profile-dropdown">
                <ul class="profile-dropdown-menu">
                  <li><a href="Account.html"><span class="dropdown-icon">👤</span> My Profile</a></li>
                  <li><a href="#logout" id="logoutLink"><span class="dropdown-icon">🚪</span> Logout</a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        <h2 style="margin:12px 0 18px;color:var(--panel)">Writing</h2>
        <p><a class="back-link" href="Shops.html">← Back to Shop</a></p>
        <p style="margin-bottom:18px;color:#5b2b18">Scripts, prompts, and written assets.</p>
        <section class="shop-list">
          <div class="mentions-grid commissions-grid">
            <article class="mention commission-card product-card" data-title="Script Template" data-artist="Writer A" data-price="$10" data-desc="Scene/script template." data-image="comm1.jpg" data-paypal="true" data-venmo="false">
              <img src="IMAGE/comm1.jpg" alt="writing 1" />
              <p class="commission-title">Script Template</p>
              <p class="commission-desc">$10 · DOCX</p>
            </article>
            <article class="mention commission-card product-card" data-title="Story Beats" data-artist="Writer B" data-price="$8" data-desc="Story beat outlines." data-image="comm2.jpg" data-paypal="true" data-venmo="true">
              <img src="IMAGE/comm2.jpg" alt="writing 2" />
              <p class="commission-title">Story Beats</p>
              <p class="commission-desc">$8 · PDF</p>
            </article>
          </div>
        </section>
      </main>
    </div>
    <script>
      document.querySelectorAll('.product-card').forEach(c => c.addEventListener('click', () => { window.location = 'Shops.html'; }));
    </script>
    <script src="profile-dropdown.js"></script>
  </body>
</html>
