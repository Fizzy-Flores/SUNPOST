<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUNPOST - Sign Up</title>
    <link rel="stylesheet" href="sunpostloginsignup.css" />
  </head>
  <body>
    <div class="page">
      <div class="animated-background" aria-hidden="true">
        <div class="bg-slide slide-1"></div>
        <div class="bg-slide slide-2"></div>
        <div class="bg-slide slide-3"></div>
        <div class="bg-slide slide-4"></div>
        <div class="bg-slide slide-5"></div>
      </div>
      <div class="signup-wrapper">
        <section class="bg-panel">
          <div class="brand-panel">
            <div class="brand-mark"></div>
            <div>
              <p class="eyebrow">SUNPOST</p>
              <h1>Create everything under the sun</h1>
              <p>
                Join our creative community and bring your ideas to life with a warm,
                inspired artistic experience.
              </p>
            </div>
          </div>
          <div class="feature-panel small-panel">
            <div class="feature-card">
              <p>Sign up to explore your artwork gallery.</p>
            </div>
          </div>
        </section>

        <section class="form-card">
          <div class="card-header">
            <p>Sign Up</p>
          </div>
          <form class="signup-form" action="#" method="post">
            <div class="input-group">
              <label for="fullName">Full name</label>
              <input id="fullName" type="text" name="fullName" placeholder="Alex Sun" required />
            </div>
            <div class="input-group">
              <label for="email">Email address</label>
              <input id="email" type="email" name="email" placeholder="you@example.com" required />
            </div>
            <div class="input-row">
              <div class="input-group half">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" placeholder="username" required />
              </div>
              <div class="input-group half">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Password" required />
              </div>
            </div>
            <div class="input-row">
              <div class="input-group half">
                <label for="confirmPassword">Confirm password</label>
                <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Confirm password" required />
              </div>
              <div class="input-group half">
                <label for="website">Website (optional)</label>
                <input id="website" type="url" name="website" placeholder="https://" />
              </div>
            </div>

            <label class="checkbox-label">
              <input type="checkbox" name="terms" required />
              Accept the terms and services
            </label>

            <button type="submit" class="submit-btn">Create account</button>

            <p class="alt-action">
              Already have an account?
              <a href="SUNPOST LOGIN.html">Login here</a>
            </p>
          </form>
        </section>
      </div>
    </div>
  </body>
</html>
